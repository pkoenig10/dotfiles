- defaults:
    link:
      create: true
      relink: true

- link:
    ~/.config/fish/config.fish: config/fish/config.fish
    ~/.config/fish/functions: config/fish/functions
    ~/.config/git/palantir: config/git/palantir
    ~/.gitconfig: gitconfig
    ~/.ssh/config: ssh/config
    ~/.vim: vim
    ~/.vimrc: vimrc
